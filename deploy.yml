# FECR Knowledge Base — Version 0.1 Foundations

A complete Docusaurus starter for the Front End Carbon Recovery website.

## Local preview

```bash
npm install
npm start
```

## GitHub Pages

This repository includes `.github/workflows/deploy.yml`.

1. Upload all project contents to the repository root.
2. In GitHub, open **Settings → Pages**.
3. Set **Source** to **GitHub Actions**.
4. Commit to `main` and watch the workflow under **Actions**.

Published URL:

`https://wbdongithub.github.io/Front-End-Carbon-Recovery/`
